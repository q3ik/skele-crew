name: Daily Standup Reminder

on:
  schedule:
    # 09:00 AM EDT = 13:00 UTC, Monday–Friday
    - cron: "0 13 * * 1-5"
  workflow_dispatch: {}

jobs:
  open-standup-issue:
    name: Open Daily Standup Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Get today's date
        id: date
        run: echo "today=$(TZ=America/Toronto date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Open standup reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = '${{ steps.date.outputs.today }}';
            const title = `Daily Standup \u2014 ${today}`;

            // Ensure the 'standup' label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'standup',
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'standup',
                  color: '0075ca',
                  description: 'Daily COO standup reminder',
                });
              } else {
                throw e;
              }
            }

            // Skip if an issue with this exact title already exists (open or closed)
            // Use the search API to avoid per_page pagination limits.
            const searchResult = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title "${title}"`,
              per_page: 1,
            });

            if (searchResult.data.total_count > 0) {
              const duplicate = searchResult.data.items[0];
              console.log(`Standup issue already exists: #${duplicate.number} (${duplicate.state})`);
              return;
            }

            const body = [
              `## Daily Standup \u2014 ${today}`,
              '',
              'Open **COO mode** in GitHub Copilot to run the automated standup sequence.',
              '',
              '### Checklist (auto-completed by COO agent)',
              '- [ ] Memory context loaded',
              '- [ ] Sentry errors checked (buzzy-game)',
              '- [ ] BOARD.md scanned for overdue tasks',
              '- [ ] Periodic prompts checked',
              '- [ ] Delegations issued',
              '- [ ] Day plan produced',
              '- [ ] Standup entity written to knowledge graph',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['standup'],
            });
